<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aucosmos XR Lab — Coming Soon</title>
  <meta name="description" content="Aucosmos XR Lab: future extended reality reflections for Moments of Tafakkur." />
  <style>
    :root {
      --bg: #080807;
      --text: #eadfd2;
      --muted: rgba(234,223,210,.72);
      --gold: #d8bd9e;
      --line: rgba(234,223,210,.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(216,189,158,.12), transparent 26%),
        radial-gradient(circle at bottom right, rgba(140,170,255,.08), transparent 24%),
        #080807;
      line-height: 1.7;
    }
    .panel {
      width: min(100%, 780px);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 34px;
      background: rgba(255,255,255,.045);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 30px 90px rgba(0,0,0,.32);
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: .78rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(3rem, 8vw, 6.5rem);
      line-height: .95;
      font-weight: 400;
      letter-spacing: -.055em;
      margin-bottom: 22px;
    }
    p {
      max-width: 560px;
      color: var(--muted);
      font-size: 1.08rem;
      margin-bottom: 28px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #17120f;
      background: #ead7c0;
      padding: 13px 18px;
      border-radius: 999px;
      font-family: Arial, sans-serif;
      font-size: .84rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="label">Aucosmos XR Lab</div>
    <h1>Coming soon</h1>
    <p>
      This space is reserved for the next project: shaping Moments of Tafakkur
      into an extended reality experience with sincerity, beauty, and meaning.
    </p>
    <a href="index.html">← Return home</a>
  </main>
</body>
</html>
